name: Foundry PR Review

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  id-token: write
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "azure-ai-projects>=2.1.0" azure-identity openai

      - name: Create Foundry runner script
        run: |
          cat > run_agent.py << 'PY'
          import os
          import sys

          from azure.identity import DefaultAzureCredential
          from azure.ai.projects import AIProjectClient
          from azure.ai.projects.models import VersionRefIndicator

          endpoint = os.environ["PROJECT_ENDPOINT"]
          agent_name = os.environ.get("AGENT_NAME", "b3agent")
          isolation_key = os.environ["ISOLATION_KEY"]
          prompt = os.environ["PROMPT"]

          with (
              DefaultAzureCredential() as credential,
              AIProjectClient(
                  endpoint=endpoint,
                  credential=credential,
                  allow_preview=True,
              ) as project_client,
          ):
              agent = project_client.agents.get(
                  agent_name=agent_name
              )

              latest_version = agent.versions["latest"].version

              session = project_client.beta.agents.create_session(
                  agent_name=agent_name,
                  isolation_key=isolation_key,
                  version_indicator=VersionRefIndicator(
                      agent_version=latest_version
                  ),
              )

              try:
                  openai_client = project_client.get_openai_client(
                      agent_name=agent_name
                  )

                  response = openai_client.responses.create(
                      input=prompt,
                      extra_body={
                          "agent_session_id": session.agent_session_id
                      },
                  )

                  output_text = getattr(response, "output_text", None)

                  if not output_text or not output_text.strip():
                      print("## Foundry Agent PR Review")
                      print()
                      print("O agente executou, mas não retornou conteúdo em `response.output_text`.")
                      print()
                      print("Verifique se o GitHub MCP do agente consegue acessar este Pull Request.")
                      sys.exit(0)

                  print(output_text)

              finally:
                  project_client.beta.agents.delete_session(
                      agent_name=agent_name,
                      session_id=session.agent_session_id,
                      isolation_key=isolation_key,
                  )
          PY

      - name: Run Foundry Agent
        env:
          PROJECT_ENDPOINT: ${{ secrets.PROJECT_ENDPOINT }}
          AGENT_NAME: b3agent
          ISOLATION_KEY: pr-${{ github.event.pull_request.number }}-${{ github.run_id }}
          PROMPT: |
            Use exclusivamente as ferramentas GitHub MCP disponíveis no agente.

            Analise o Pull Request abaixo:

            Repository:
            ${{ github.repository }}

            Pull Request:
            #${{ github.event.pull_request.number }}

            Pull Request Title:
            ${{ github.event.pull_request.title }}

            Base Branch:
            ${{ github.event.pull_request.base.ref }}

            Source Branch:
            ${{ github.event.pull_request.head.ref }}

            Commit SHA:
            ${{ github.event.pull_request.head.sha }}

            Tarefas obrigatórias:

            1. Localize o Pull Request informado no GitHub.
            2. Leia os arquivos alterados.
            3. Leia o diff do Pull Request.
            4. Analise:
               - OWASP Top 10
               - Segurança
               - Bugs potenciais
               - Performance
               - Arquitetura
               - Manutenibilidade
               - Testes ausentes ou frágeis
            5. Gere um review objetivo em Markdown.

            Estrutura obrigatória:

            ## Summary

            ## Security

            ## Architecture

            ## Performance

            ## Maintainability

            ## Tests

            ## Suggested Improvements

            ## Approval Recommendation

            No final, use uma destas recomendações:

            APPROVE

            COMMENT

            REQUEST CHANGES

            Não invente arquivos, linhas ou problemas. Se não conseguir acessar o PR pelo GitHub MCP, informe claramente o motivo.
        run: |
          python run_agent.py > review.md

          echo "===== GENERATED REVIEW ====="
          cat review.md

      - name: Publish or update PR comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");

            const marker = "<!-- foundry-agent-pr-review -->";
            const review = fs.readFileSync("review.md", "utf8");

            const body = `${marker}

            # Foundry Agent PR Review

            ${review}
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const previousComment = comments.data.find(comment =>
              comment.body && comment.body.includes(marker)
            );

            if (previousComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previousComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

name: Foundry PR Review

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  id-token: write
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Azure Login
        run: |
          az account show

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "azure-ai-projects>=2.1.0"
          pip install azure-identity
          pip install openai

      - name: Create runner script
        run: |
          cat > run_agent.py << 'EOF'
          import os
          from azure.identity import DefaultAzureCredential
          from azure.ai.projects import AIProjectClient
          from azure.ai.projects.models import VersionRefIndicator

          endpoint = os.environ["PROJECT_ENDPOINT"]
          agent_name = "b3agent"

          with (
              DefaultAzureCredential() as credential,
              AIProjectClient(
                  endpoint=endpoint,
                  credential=credential,
                  allow_preview=True,
              ) as project_client,
          ):

              agent = project_client.agents.get(
                  agent_name=agent_name
              )

              latest_version = agent.versions["latest"].version

              session = project_client.beta.agents.create_session(
                  agent_name=agent_name,
                  isolation_key=os.environ["ISOLATION_KEY"],
                  version_indicator=VersionRefIndicator(
                      agent_version=latest_version
                  ),
              )

              try:
                  openai_client = project_client.get_openai_client(
                      agent_name=agent_name
                  )

                  response = openai_client.responses.create(
                      input=os.environ["PROMPT"],
                      extra_body={
                          "agent_session_id": session.agent_session_id
                      }
                  )

                  print(response.output_text)

              finally:
                  project_client.beta.agents.delete_session(
                      agent_name=agent_name,
                      session_id=session.agent_session_id,
                      isolation_key=os.environ["ISOLATION_KEY"],
                  )
          EOF

      - name: Run Foundry Agent
        run: |
          python run_agent.py > review.md
          cat review.md

        env:
          PROJECT_ENDPOINT: ${{ secrets.PROJECT_ENDPOINT }}

          ISOLATION_KEY: pr-${{ github.event.pull_request.number }}-${{ github.run_id }}

          PROMPT: |
            Use exclusivamente as ferramentas GitHub MCP.

            Analise o Pull Request:

            Repository:
            ${{ github.repository }}

            Pull Request:
            #${{ github.event.pull_request.number }}

            Base Branch:
            ${{ github.event.pull_request.base.ref }}

            Source Branch:
            ${{ github.event.pull_request.head.ref }}

            Commit SHA:
            ${{ github.event.pull_request.head.sha }}

            Execute:

            1. Localize o Pull Request.
            2. Leia os arquivos alterados.
            3. Leia o diff.
            4. Analise:
               - OWASP Top 10
               - Segurança
               - Bugs
               - Performance
               - Arquitetura
               - Manutenibilidade
            5. Gere um review em Markdown.

            Estrutura:

            ## Summary

            ## Security

            ## Architecture

            ## Performance

            ## Maintainability

            ## Suggested Improvements

            ## Approval Recommendation

      - name: Publish Review
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            const review = fs.readFileSync(
              'review.md',
              'utf8'
            );

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: review
            });

name: Foundry PR Review

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  id-token: write
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Debug Azure Account
        run: |
          echo "===== AZ ACCOUNT ====="
          az account show

      - name: Debug Service Principal
        continue-on-error: true
        run: |
          echo "===== SERVICE PRINCIPAL ====="

          az ad sp show \
            --id ${{ secrets.AZURE_CLIENT_ID }} \
            --query "{appId:appId,id:id,displayName:displayName}" \
            -o json

      - name: List Role Assignments
        continue-on-error: true
        run: |
          echo "===== ROLE ASSIGNMENTS ====="

          az role assignment list \
            --assignee ${{ secrets.AZURE_CLIENT_ID }} \
            --all \
            -o table

      - name: List AML Workspaces
        continue-on-error: true
        run: |
          echo "===== AML WORKSPACES ====="

          az resource list \
            --resource-type Microsoft.MachineLearningServices/workspaces \
            -o table

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          pip install \
            "azure-ai-projects>=2.1.0" \
            azure-identity \
            openai

      - name: Validate Foundry Access
        continue-on-error: true
        env:
          PROJECT_ENDPOINT: ${{ secrets.PROJECT_ENDPOINT }}
        run: |
          cat > validate_access.py << 'PY'
          from azure.identity import DefaultAzureCredential
          from azure.ai.projects import AIProjectClient

          endpoint = "${PROJECT_ENDPOINT}"

          print("Endpoint:", endpoint)

          client = AIProjectClient(
              endpoint=endpoint,
              credential=DefaultAzureCredential(),
              allow_preview=True
          )

          print("Listing agents...")

          try:
              agents = client.agents.list()

              for agent in agents:
                  print("Agent:", getattr(agent, "name", "unknown"))

              print("SUCCESS")

          except Exception as e:
              print("ERROR:")
              print(str(e))
              raise
          PY

          sed -i "s|\${PROJECT_ENDPOINT}|$PROJECT_ENDPOINT|g" validate_access.py

          python validate_access.py

      - name: Create runner script
        run: |
          cat > run_agent.py << 'PY'
          import os

          from azure.identity import DefaultAzureCredential
          from azure.ai.projects import AIProjectClient
          from azure.ai.projects.models import VersionRefIndicator

          endpoint = os.environ["PROJECT_ENDPOINT"]
          agent_name = "b3agent"

          print("Using endpoint:", endpoint)

          with (
              DefaultAzureCredential() as credential,
              AIProjectClient(
                  endpoint=endpoint,
                  credential=credential,
                  allow_preview=True,
              ) as project_client,
          ):

              print("Getting agent...")

              agent = project_client.agents.get(
                  agent_name
              )

              latest_version = agent.versions["latest"].version

              print("Latest version:", latest_version)

              session = project_client.beta.agents.create_session(
                  agent_name=agent_name,
                  isolation_key=os.environ["ISOLATION_KEY"],
                  version_indicator=VersionRefIndicator(
                      agent_version=latest_version
                  ),
              )

              try:

                  openai_client = project_client.get_openai_client(
                      agent_name=agent_name
                  )

                  response = openai_client.responses.create(
                      input=os.environ["PROMPT"],
                      extra_body={
                          "agent_session_id": session.agent_session_id
                      }
                  )

                  print(response.output_text)

              finally:

                  project_client.beta.agents.delete_session(
                      agent_name=agent_name,
                      session_id=session.agent_session_id,
                      isolation_key=os.environ["ISOLATION_KEY"],
                  )
          PY

      - name: Run Agent
        env:
          PROJECT_ENDPOINT: ${{ secrets.PROJECT_ENDPOINT }}
          ISOLATION_KEY: pr-${{ github.event.pull_request.number }}-${{ github.run_id }}

          PROMPT: |
            Use exclusivamente as ferramentas GitHub MCP.

            Repository:
            ${{ github.repository }}

            Pull Request:
            #${{ github.event.pull_request.number }}

            Base Branch:
            ${{ github.event.pull_request.base.ref }}

            Source Branch:
            ${{ github.event.pull_request.head.ref }}

            Commit SHA:
            ${{ github.event.pull_request.head.sha }}

            Localize o PR.
            Leia os arquivos alterados.
            Leia o diff.
            Gere um review em Markdown.

        run: |
          python run_agent.py > review.md

          echo "===== REVIEW ====="
          cat review.md

      - name: Publish Review
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            const review = fs.readFileSync(
              'review.md',
              'utf8'
            );

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: review
            });

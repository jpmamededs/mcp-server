name: MCP Server CI — Demo Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  # ── 1. Validação ─────────────────────────────────────────────────────────────
  validate:
    name: Validate & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests (if available)
        run: |
          if [ -f "test_mcp_github.py" ]; then
            pip install pytest
            pytest test_mcp_github.py -v
          else
            echo "Nenhum arquivo de testes encontrado, pulando etapa."
          fi

  # ── 2. Avaliação por IA (Azure AI Foundry) ───────────────────────────────────
  ai-review:
    name: Avaliação por Agente IA
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # necessário para postar comentário no PR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # histórico completo para comparar branches
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Azure AI dependencies
        run: pip install requests

      - name: Listar arquivos alterados no PR
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed_files.txt
          echo "=== Arquivos alterados ==="
          cat changed_files.txt

      - name: Executar avaliação com agente Azure AI Foundry
        env:
          AZURE_AI_FOUNDRY_ENDPOINT: ${{ secrets.AZURE_AI_FOUNDRY_ENDPOINT }}
          AZURE_AI_FOUNDRY_AGENT_ID: ${{ secrets.AZURE_AI_FOUNDRY_AGENT_ID }}
          AZURE_AI_FOUNDRY_API_KEY: ${{ secrets.AZURE_AI_FOUNDRY_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python - << 'EOF'
          import os, json, time, urllib.request

          # Configuração
          endpoint = os.environ["AZURE_AI_FOUNDRY_ENDPOINT"].rstrip("/")
          api_key = os.environ["AZURE_AI_FOUNDRY_API_KEY"]
          agent_id = os.environ["AZURE_AI_FOUNDRY_AGENT_ID"]
          repo = os.environ["REPO"]
          pr_number = os.environ["PR_NUMBER"]
          gh_token = os.environ["GH_TOKEN"]

          headers = {
              "api-key": api_key,
              "Content-Type": "application/json",
          }

          print(f"✅ Configurado para {endpoint}")
          print(f"🤖 Agente: {agent_id}")

          # ── Ler conteúdo dos arquivos alterados ───────────────────────────────
          MAX_CHARS_PER_FILE = 8_000
          with open("changed_files.txt") as f:
              changed_files = [l.strip() for l in f if l.strip()]

          files_block = ""
          for path in changed_files:
              if os.path.exists(path):
                  try:
                      with open(path, encoding="utf-8", errors="replace") as f:
                          content = f.read(MAX_CHARS_PER_FILE)
                      files_block += f"\n\n### `{path}`\n```\n{content}\n```"
                  except Exception as e:
                      files_block += f"\n\n### `{path}`\n*(erro ao ler: {e})*"
              else:
                  files_block += f"\n\n### `{path}`\n*(arquivo removido)*"

          if not files_block:
              files_block = "\nNenhum arquivo alterado."

          prompt = (
              "Você é um revisor técnico de código. Analise os arquivos alterados neste Pull Request:\n"
              "1. **Resumo das mudanças**\n"
              "2. **Possíveis problemas ou riscos**\n"
              "3. **Boas práticas**\n"
              "4. **Recomendação final** — Aprovar ✅ ou Solicitar ajustes 🔄\n\n"
              f"Arquivos alterados:{files_block}"
          )

          try:
              # ── 1. Criar thread ──────────────────────────────────────────────────
              print("📝 Criando thread...")
              thread_url = f"{endpoint}/threads"
              thread_req = urllib.request.Request(
                  thread_url,
                  data=b"{}",
                  headers=headers,
                  method="POST"
              )
              thread_resp = urllib.request.urlopen(thread_req)
              thread_data = json.loads(thread_resp.read().decode())
              thread_id = thread_data["id"]
              print(f"✅ Thread criada: {thread_id}")

              # ── 2. Enviar mensagem ──────────────────────────────────────────────
              print("💬 Enviando mensagem...")
              msg_url = f"{endpoint}/threads/{thread_id}/messages"
              msg_body = json.dumps({
                  "role": "user",
                  "content": prompt
              }).encode()
              msg_req = urllib.request.Request(
                  msg_url,
                  data=msg_body,
                  headers=headers,
                  method="POST"
              )
              urllib.request.urlopen(msg_req)
              print("✅ Mensagem enviada")

              # ── 3. Criar run ────────────────────────────────────────────────────
              print(f"🤖 Executando agente...")
              run_url = f"{endpoint}/threads/{thread_id}/runs"
              run_body = json.dumps({
                  "assistant_id": agent_id
              }).encode()
              run_req = urllib.request.Request(
                  run_url,
                  data=run_body,
                  headers=headers,
                  method="POST"
              )
              run_resp = urllib.request.urlopen(run_req)
              run_data = json.loads(run_resp.read().decode())
              run_id = run_data["id"]
              print(f"⏳ Run ID: {run_id}")

              # ── 4. Aguardar conclusão ────────────────────────────────────────────
              max_wait = 300
              elapsed = 0
              while elapsed < max_wait:
                  status_url = f"{endpoint}/threads/{thread_id}/runs/{run_id}"
                  status_req = urllib.request.Request(status_url, headers=headers)
                  status_resp = urllib.request.urlopen(status_req)
                  status_data = json.loads(status_resp.read().decode())
                  status = status_data["status"]

                  if status == "completed":
                      print("✅ Agente completou")
                      break
                  elif status in ("failed", "expired", "cancelled"):
                      raise RuntimeError(f"Run falhou com status: {status}")
                  
                  print(f"   Status: {status} ({elapsed}s)")
                  time.sleep(5)
                  elapsed += 5
              else:
                  raise RuntimeError(f"Timeout: agente não completou em {max_wait}s")

              # ── 5. Recuperar mensagens ───────────────────────────────────────────
              print("📖 Recuperando resposta...")
              msgs_url = f"{endpoint}/threads/{thread_id}/messages"
              msgs_req = urllib.request.Request(msgs_url, headers=headers)
              msgs_resp = urllib.request.urlopen(msgs_req)
              msgs_data = json.loads(msgs_resp.read().decode())
              
              response_text = "O agente não retornou uma avaliação."
              for msg in msgs_data.get("data", []):
                  if msg.get("role") == "assistant":
                      content = msg.get("content", [])
                      if content and "text" in content[0]:
                          response_text = content[0]["text"]["value"]
                          break
              print("✅ Resposta recuperada")

          except Exception as e:
              print(f"❌ Erro ao executar agente: {e}")
              import traceback
              traceback.print_exc()
              raise

          # ── 6. Postar comentário no PR ───────────────────────────────────────
          changed_list = "\n".join(f"- `{p}`" for p in changed_files) or "- (nenhum)"
          body = (
              "## 🤖 Avaliação do Agente Azure AI Foundry\n\n"
              f"**Arquivos analisados:**\n{changed_list}\n\n"
              "---\n\n"
              f"{response_text}"
          )
          payload = json.dumps({"body": body}).encode()
          gh_req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments",
              data=payload,
              headers={
                  "Authorization": f"Bearer {gh_token}",
                  "Content-Type": "application/json",
              },
              method="POST"
          )
          urllib.request.urlopen(gh_req)
          print("✅ Avaliação postada no PR")
          EOF

  # ── 3. Aprovação humana ───────────────────────────────────────────────────────
  # Para ativar a pausa: Settings → Environments → approval → Required reviewers
  approval:
    name: Aguardar Aprovação Humana
    needs: ai-review
    runs-on: ubuntu-latest
    environment: approval   # <-- revisor clica em "Approve" no GitHub antes de continuar

    steps:
      - name: Aprovação recebida
        run: echo "✅ Aprovação concedida. Prosseguindo para o deploy simulado."

  # ── 3. Deploy simulado (demo) ────────────────────────────────────────────────
  deploy:
    name: Deploy (Simulado)
    needs: approval
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Simular deploy
        run: |
          echo "🚀 Iniciando deploy simulado do MCP Server..."
          echo "   Repositório : ${{ github.repository }}"
          echo "   Branch      : ${{ github.head_ref }}"
          echo "   Commit      : ${{ github.sha }}"
          echo "✅ Deploy simulado concluído com sucesso!"

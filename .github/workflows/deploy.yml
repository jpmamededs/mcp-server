name: MCP Server CI — Demo Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  # ── 1. Validação ─────────────────────────────────────────────────────────────
  validate:
    name: Validate & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests (if available)
        run: |
          if [ -f "test_mcp_github.py" ]; then
            pip install pytest
            pytest test_mcp_github.py -v
          else
            echo "Nenhum arquivo de testes encontrado, pulando etapa."
          fi

  # ── 2. Avaliação por IA (Azure AI Foundry) ───────────────────────────────────
  ai-review:
    name: Avaliação por Agente IA
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # necessário para postar comentário no PR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # histórico completo para comparar branches
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Listar arquivos alterados no PR
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed_files.txt
          echo "=== Arquivos alterados ==="
          cat changed_files.txt

      - name: Executar avaliação com agente Azure AI Foundry
        env:
          AZURE_AI_FOUNDRY_ENDPOINT: ${{ secrets.AZURE_AI_FOUNDRY_ENDPOINT }}
          AZURE_AI_FOUNDRY_AGENT_ID: ${{ secrets.AZURE_AI_FOUNDRY_AGENT_ID }}
          AZURE_AI_FOUNDRY_API_KEY: ${{ secrets.AZURE_AI_FOUNDRY_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python - << 'EOF'
          import os, json, urllib.request, urllib.error

          # Configuração
          endpoint = os.environ["AZURE_AI_FOUNDRY_ENDPOINT"].rstrip("/")
          api_key = os.environ["AZURE_AI_FOUNDRY_API_KEY"]
          agent_id = os.environ.get("AZURE_AI_FOUNDRY_AGENT_ID", "").strip()
          agent_name = os.environ.get("AZURE_AI_FOUNDRY_AGENT_NAME", "").strip()
          repo = os.environ["REPO"]
          pr_number = os.environ["PR_NUMBER"]
          gh_token = os.environ["GH_TOKEN"]

          print(f"✅ Conectando a {endpoint}")
          print(f"🤖 Agente ID: {agent_id if agent_id else '(não informado)'}")
          print(f"🤖 Agente Nome: {agent_name if agent_name else '(não informado)'}")

          # Se o nome não foi informado, tenta usar o valor do ID como fallback.
          # Em vários setups esse secret guarda o nome lógico do agente.
          if not agent_name and agent_id:
              agent_name = agent_id

          # ── Ler conteúdo dos arquivos alterados ───────────────────────────────
          MAX_CHARS_PER_FILE = 8_000
          with open("changed_files.txt") as f:
              changed_files = [l.strip() for l in f if l.strip()]

          files_block = ""
          for path in changed_files:
              if os.path.exists(path):
                  try:
                      with open(path, encoding="utf-8", errors="replace") as f:
                          content = f.read(MAX_CHARS_PER_FILE)
                      files_block += f"\n\n### `{path}`\n```\n{content}\n```"
                  except Exception as e:
                      files_block += f"\n\n### `{path}`\n*(erro ao ler: {e})*"
              else:
                  files_block += f"\n\n### `{path}`\n*(arquivo removido)*"

          if not files_block:
              files_block = "\nNenhum arquivo alterado."

          prompt = (
              "Você é um revisor técnico de código. Analise os arquivos alterados neste Pull Request:\n"
              "1. **Resumo das mudanças**\n"
              "2. **Possíveis problemas ou riscos**\n"
              "3. **Boas práticas**\n"
              "4. **Recomendação final** — Aprovar ✅ ou Solicitar ajustes 🔄\n\n"
              f"Arquivos alterados:{files_block}"
          )

          try:
              if not agent_id and not agent_name:
                raise RuntimeError("Defina AZURE_AI_FOUNDRY_AGENT_ID (ou AZURE_AI_FOUNDRY_AGENT_NAME) nos secrets")

              # Descobrir URL correta de responses por tipo de endpoint.
              is_app_endpoint = "/applications/" in endpoint and endpoint.endswith("/protocols/openai")
              if is_app_endpoint:
                responses_url = f"{endpoint}/responses?api-version=2025-11-15-preview"
              elif endpoint.endswith("/openai/v1"):
                responses_url = f"{endpoint}/responses"
              else:
                responses_url = f"{endpoint}/openai/v1/responses"

              print(f"🤖 Chamando endpoint: {responses_url}")

              def call_responses(body_dict):
                req = urllib.request.Request(
                  responses_url,
                  data=json.dumps(body_dict).encode("utf-8"),
                  headers={
                    "api-key": api_key,
                    "Content-Type": "application/json",
                  },
                  method="POST",
                )
                with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode("utf-8", errors="replace"))

              attempts = []
              if is_app_endpoint:
                # Agent Application já está ligado a um agente publicado.
                attempts.append({"input": prompt})
              else:
                # Projeto Foundry: tenta forma por nome e depois por id.
                if agent_name:
                  attempts.append({
                    "input": prompt,
                    "agent_reference": {"type": "agent_reference", "name": agent_name},
                  })
                if agent_id and agent_id != agent_name:
                  attempts.append({
                    "input": prompt,
                    "agent_reference": {"type": "agent_reference", "id": agent_id},
                  })

              data = None
              last_error = None
              for i, body_dict in enumerate(attempts, start=1):
                try:
                  print(f"🔁 Tentativa {i}/{len(attempts)}")
                  data = call_responses(body_dict)
                  break
                except urllib.error.HTTPError as he:
                  err_body = ""
                  try:
                    err_body = he.read().decode("utf-8", errors="replace")
                  except Exception:
                    pass
                  print(f"⚠️ HTTP {he.code} na tentativa {i}: {he.reason}")
                  if err_body:
                    print("📄 Corpo do erro:")
                    print(err_body)
                  last_error = he

              if data is None:
                raise last_error or RuntimeError("Falha ao chamar endpoint de responses")

              response_text = data.get("output_text", "")
              if not response_text:
                # fallback para casos em que output_text não venha preenchido
                response_text = json.dumps(data.get("output", data), ensure_ascii=False, indent=2)
              print("✅ Resposta recebida")

          except Exception as e:
              print(f"❌ Erro ao executar agente: {e}")
              import traceback
              traceback.print_exc()
              raise

          # ── Postar comentário no PR ───────────────────────────────────────────
          changed_list = "\n".join(f"- `{p}`" for p in changed_files) or "- (nenhum)"
          body = (
              "## 🤖 Avaliação do Agente Azure AI Foundry\n\n"
              f"**Arquivos analisados:**\n{changed_list}\n\n"
              "---\n\n"
              f"{response_text}"
          )
          payload = json.dumps({"body": body}).encode()
          gh_req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments",
              data=payload,
              headers={
                  "Authorization": f"Bearer {gh_token}",
                  "Content-Type": "application/json",
              },
              method="POST"
          )
          urllib.request.urlopen(gh_req)
          print("✅ Avaliação postada no PR")
          EOF

  # ── 3. Aprovação humana ───────────────────────────────────────────────────────
  # Para ativar a pausa: Settings → Environments → approval → Required reviewers
  approval:
    name: Aguardar Aprovação Humana
    needs: ai-review
    runs-on: ubuntu-latest
    environment: approval   # <-- revisor clica em "Approve" no GitHub antes de continuar

    steps:
      - name: Aprovação recebida
        run: echo "✅ Aprovação concedida. Prosseguindo para o deploy simulado."

  # ── 3. Deploy simulado (demo) ────────────────────────────────────────────────
  deploy:
    name: Deploy (Simulado)
    needs: approval
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Simular deploy
        run: |
          echo "🚀 Iniciando deploy simulado do MCP Server..."
          echo "   Repositório : ${{ github.repository }}"
          echo "   Branch      : ${{ github.head_ref }}"
          echo "   Commit      : ${{ github.sha }}"
          echo "✅ Deploy simulado concluído com sucesso!"

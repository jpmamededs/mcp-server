name: AI PR Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  review:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install jq -y

      - name: Call Foundry Agent
        id: agent

        run: |
          RESPONSE=$(curl -s \
            -X POST "${{ secrets.FOUNDRY_ENDPOINT }}" \
            -H "api-key: ${{ secrets.FOUNDRY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"messages\": [
                {
                  \"role\": \"user\",
                  \"content\": \"Review Pull Request #${{ github.event.pull_request.number }} from repository ${{ github.repository }} using GitHub MCP tools.\"
                }
              ]
            }")

          echo "$RESPONSE" > response.json

          REVIEW=$(jq -r '.choices[0].message.content' response.json)

          {
            echo 'review<<EOF'
            echo "$REVIEW"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Publish Review
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.agent.outputs.review }}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: review
            });

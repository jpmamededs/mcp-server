name: MCP Server CI — Demo Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  # ── 1. Validação ─────────────────────────────────────────────────────────────
  validate:
    name: Validate & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests (if available)
        run: |
          if [ -f "test_mcp_github.py" ]; then
            pip install pytest
            pytest test_mcp_github.py -v
          else
            echo "Nenhum arquivo de testes encontrado, pulando etapa."
          fi

  # ── 2. Avaliação por IA (Azure AI Foundry) ───────────────────────────────────
  ai-review:
    name: Avaliação por Agente IA
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # necessário para postar comentário no PR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # histórico completo para comparar branches
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Azure AI dependencies
        run: pip install "azure-ai-projects>=2.1.0"

      - name: Listar arquivos alterados no PR
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed_files.txt
          echo "=== Arquivos alterados ==="
          cat changed_files.txt

      - name: Executar avaliação com agente Azure AI Foundry
        env:
          AZURE_AI_FOUNDRY_ENDPOINT: ${{ secrets.AZURE_AI_FOUNDRY_ENDPOINT }}
          AZURE_AI_FOUNDRY_AGENT_ID: ${{ secrets.AZURE_AI_FOUNDRY_AGENT_ID }}
          AZURE_AI_FOUNDRY_API_KEY: ${{ secrets.AZURE_AI_FOUNDRY_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python - << 'EOF'
          import os, json, urllib.request
          from azure.ai.projects import AIProjectClient
          from azure.ai.projects.models import VersionRefIndicator
          from azure.core.credentials import AzureKeyCredential

          # Configuração
          endpoint = os.environ["AZURE_AI_FOUNDRY_ENDPOINT"].rstrip("/")
          api_key = os.environ["AZURE_AI_FOUNDRY_API_KEY"]
          agent_name = "b3agent"  # nome do agente no Foundry
          repo = os.environ["REPO"]
          pr_number = os.environ["PR_NUMBER"]
          gh_token = os.environ["GH_TOKEN"]

          print(f"✅ Conectando a {endpoint}")
          print(f"🤖 Agente: {agent_name}")

          # ── Ler conteúdo dos arquivos alterados ───────────────────────────────
          MAX_CHARS_PER_FILE = 8_000
          with open("changed_files.txt") as f:
              changed_files = [l.strip() for l in f if l.strip()]

          files_block = ""
          for path in changed_files:
              if os.path.exists(path):
                  try:
                      with open(path, encoding="utf-8", errors="replace") as f:
                          content = f.read(MAX_CHARS_PER_FILE)
                      files_block += f"\n\n### `{path}`\n```\n{content}\n```"
                  except Exception as e:
                      files_block += f"\n\n### `{path}`\n*(erro ao ler: {e})*"
              else:
                  files_block += f"\n\n### `{path}`\n*(arquivo removido)*"

          if not files_block:
              files_block = "\nNenhum arquivo alterado."

          prompt = (
              "Você é um revisor técnico de código. Analise os arquivos alterados neste Pull Request:\n"
              "1. **Resumo das mudanças**\n"
              "2. **Possíveis problemas ou riscos**\n"
              "3. **Boas práticas**\n"
              "4. **Recomendação final** — Aprovar ✅ ou Solicitar ajustes 🔄\n\n"
              f"Arquivos alterados:{files_block}"
          )

          try:
              credential = AzureKeyCredential(api_key)
              with AIProjectClient(
                  endpoint=endpoint,
                  credential=credential,
                  allow_preview=True,
              ) as project_client:
                  # ── Obter versão mais recente do agente ────────────────────────
                  print("📋 Obtendo versão mais recente do agente...")
                  agent = project_client.agents.get(agent_name=agent_name)
                  agent_version = agent.versions["latest"].version
                  print(f"✅ Versão: {agent_version}")

                  # ── Criar sessão ──────────────────────────────────────────────────
                  print("📝 Criando sessão...")
                  session = project_client.beta.agents.create_session(
                      agent_name=agent_name,
                      isolation_key="github-actions",
                      version_indicator=VersionRefIndicator(agent_version=agent_version),
                  )
                  print(f"✅ Sessão criada: {session.agent_session_id}")

                  try:
                      print("🤖 Chamando agente...")
                      openai_client = project_client.get_openai_client(agent_name=agent_name)
                      response = openai_client.responses.create(
                          input=prompt,
                          extra_body={
                              "agent_session_id": session.agent_session_id,
                          },
                      )
                      response_text = response.output_text
                      print("✅ Resposta recebida")
                  finally:
                      print("🧹 Limpando sessão...")
                      project_client.beta.agents.delete_session(
                          agent_name=agent_name,
                          session_id=session.agent_session_id,
                          isolation_key="github-actions",
                      )

          except Exception as e:
              print(f"❌ Erro ao executar agente: {e}")
              import traceback
              traceback.print_exc()
              raise

          # ── Postar comentário no PR ───────────────────────────────────────────
          changed_list = "\n".join(f"- `{p}`" for p in changed_files) or "- (nenhum)"
          body = (
              "## 🤖 Avaliação do Agente Azure AI Foundry\n\n"
              f"**Arquivos analisados:**\n{changed_list}\n\n"
              "---\n\n"
              f"{response_text}"
          )
          payload = json.dumps({"body": body}).encode()
          gh_req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments",
              data=payload,
              headers={
                  "Authorization": f"Bearer {gh_token}",
                  "Content-Type": "application/json",
              },
              method="POST"
          )
          urllib.request.urlopen(gh_req)
          print("✅ Avaliação postada no PR")
          EOF

  # ── 3. Aprovação humana ───────────────────────────────────────────────────────
  # Para ativar a pausa: Settings → Environments → approval → Required reviewers
  approval:
    name: Aguardar Aprovação Humana
    needs: ai-review
    runs-on: ubuntu-latest
    environment: approval   # <-- revisor clica em "Approve" no GitHub antes de continuar

    steps:
      - name: Aprovação recebida
        run: echo "✅ Aprovação concedida. Prosseguindo para o deploy simulado."

  # ── 3. Deploy simulado (demo) ────────────────────────────────────────────────
  deploy:
    name: Deploy (Simulado)
    needs: approval
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Simular deploy
        run: |
          echo "🚀 Iniciando deploy simulado do MCP Server..."
          echo "   Repositório : ${{ github.repository }}"
          echo "   Branch      : ${{ github.head_ref }}"
          echo "   Commit      : ${{ github.sha }}"
          echo "✅ Deploy simulado concluído com sucesso!"
